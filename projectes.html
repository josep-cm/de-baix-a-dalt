<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projectes — De baix a dalt</title>
  <meta name="description" content="Casos reals de construcció eficient, aerotèrmia i instal·lació solar a Catalunya. Obra nova, reforma integral i instal·lacions tèrmiques." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://debaixadalt.cat/projectes/" />
  <link rel="alternate" hreflang="ca" href="https://debaixadalt.cat/projectes/" />
  <link rel="alternate" hreflang="es" href="https://debaixadalt.cat/es/proyectos/" />
  <link rel="alternate" hreflang="x-default" href="https://debaixadalt.cat/projectes/" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://debaixadalt.cat/projectes/" />
  <meta property="og:title" content="Projectes — De baix a dalt" />
  <meta property="og:description" content="Casos reals de construcció eficient, aerotèrmia i instal·lació solar a Catalunya." />
  <meta property="og:image" content="https://debaixadalt.cat/assets/og-image.jpg" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "@id": "https://debaixadalt.cat/projectes/",
    "name": "Projectes — De baix a dalt",
    "description": "Casos reals de construcció eficient, aerotèrmia i instal·lació solar a Catalunya.",
    "url": "https://debaixadalt.cat/projectes/",
    "inLanguage": ["ca", "es"],
    "publisher": { "@id": "https://debaixadalt.cat/#business" }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;450;500;600&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="assets/logo-chevron.png" />

  <style>
    .page-hero {
      padding: 120px 0 80px;
      background: var(--ink);
      color: var(--white);
    }
    .page-hero__eyebrow { margin-bottom: 24px; }
    .page-hero__title { font-size: clamp(2.4rem, 5vw, 4rem); font-weight: 500; letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 24px; }
    .page-hero__sub { font-size: 1.1rem; color: rgba(255,255,255,0.6); max-width: 52ch; }

    .projects-filters {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 32px 0;
      border-bottom: 1px solid var(--line);
    }
    .filter-btn {
      font-family: var(--font-mono);
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 8px 16px; border-radius: 4px;
      border: 1px solid var(--line);
      background: none; cursor: pointer; color: var(--ink-muted);
      transition: all .2s;
    }
    .filter-btn:hover, .filter-btn.is-active {
      background: var(--ink); color: var(--white); border-color: var(--ink);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2px;
      margin-top: 2px;
    }
    .project-card {
      position: relative; overflow: hidden;
      background: var(--paper);
      aspect-ratio: 4/3;
      cursor: pointer;
    }
    .project-card__img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .6s cubic-bezier(0.22,1,0.36,1);
    }
    .project-card:hover .project-card__img { transform: scale(1.04); }
    .project-card__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,10,10,0.85) 0%, rgba(10,10,10,0.1) 55%, transparent 100%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 28px;
      opacity: 0; transition: opacity .3s;
    }
    .project-card:hover .project-card__overlay { opacity: 1; }
    .project-card__info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 28px;
      background: linear-gradient(to top, rgba(10,10,10,0.78) 0%, transparent 100%);
    }
    .project-card__tag {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 6px; display: block;
    }
    .project-card__name {
      color: var(--white); font-size: 1.05rem; font-weight: 500;
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .project-card__meta {
      color: rgba(255,255,255,0.55); font-size: 13px; margin-top: 4px;
    }
    .project-card__stats {
      display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap;
    }
    .project-card__stat { text-align: center; }
    .project-card__stat strong { display: block; color: var(--white); font-size: 1.2rem; font-weight: 500; }
    .project-card__stat span { color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 0.06em; }

    .project-card--featured {
      grid-column: span 2;
      aspect-ratio: 16/7;
    }
    @media (max-width: 720px) {
      .project-card--featured { grid-column: span 1; aspect-ratio: 4/3; }
      .projects-grid { grid-template-columns: 1fr; }
    }

    .stats-bar {
      display: flex; gap: 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
      margin: 64px 0;
    }
    .stats-bar__item {
      flex: 1; padding: 32px 24px; text-align: center;
      border-right: 1px solid var(--line);
    }
    .stats-bar__item:last-child { border-right: none; }
    .stats-bar__num { font-size: 2.4rem; font-weight: 500; letter-spacing: -0.04em; color: var(--ink); }
    .stats-bar__label { font-size: 13px; color: var(--ink-muted); margin-top: 4px; }
    @media (max-width: 600px) {
      .stats-bar { flex-wrap: wrap; }
      .stats-bar__item { flex: 1 1 50%; border-right: none; border-bottom: 1px solid var(--line); }
    }

    .cta-projects {
      background: var(--ink); color: var(--white);
      padding: 80px 0; text-align: center;
    }
    .cta-projects__title { font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 500; letter-spacing: -0.03em; margin-bottom: 16px; }
    .cta-projects__sub { color: rgba(255,255,255,0.6); font-size: 1.05rem; max-width: 46ch; margin: 0 auto 40px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="image-slot.js"></script>
  <script src="i18n.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>

  <script type="text/babel">
    const PROJECTS = [
      {
        id: "casa-matadepera",
        tag: "Obra nova · Casa unifamiliar",
        name: "Casa unifamiliar a Matadepera",
        location: "Matadepera, Vallès Occidental",
        year: "2024",
        m2: "320 m²",
        services: ["Construcció", "Aerotèrmia", "Solar", "Domòtica"],
        stats: [
          { val: "320", unit: "m²" },
          { val: "42%", unit: "estalvi" },
          { val: "A+", unit: "certificació" },
        ],
        img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1200&q=85&auto=format&fit=crop",
        featured: true,
      },
      {
        id: "reforma-sabadell",
        tag: "Reforma integral",
        name: "Reforma integral pis a Sabadell",
        location: "Sabadell, Vallès Occidental",
        year: "2024",
        m2: "95 m²",
        services: ["Reforma", "Aerotèrmia", "Elèctrica"],
        stats: [
          { val: "95", unit: "m²" },
          { val: "38%", unit: "estalvi" },
          { val: "B", unit: "certificació" },
        ],
        img: "https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?w=900&q=85&auto=format&fit=crop",
        featured: false,
      },
      {
        id: "solar-sant-cugat",
        tag: "Energia solar",
        name: "Instal·lació solar + bateries Sant Cugat",
        location: "Sant Cugat del Vallès",
        year: "2024",
        m2: "15 kWp",
        services: ["Solar", "Bateries", "Monitoratge"],
        stats: [
          { val: "15", unit: "kWp" },
          { val: "82%", unit: "autoconsum" },
          { val: "6.2", unit: "anys ROI" },
        ],
        img: "https://images.unsplash.com/photo-1509391366360-2e959784a276?w=900&q=85&auto=format&fit=crop",
        featured: false,
      },
      {
        id: "edifici-cornella",
        tag: "Edifici plurifamiliar",
        name: "Edifici de 12 habitatges a Cornellà",
        location: "Cornellà de Llobregat, Baix Llobregat",
        year: "2023",
        m2: "1.850 m²",
        services: ["Construcció", "Solar comunitari", "Domòtica"],
        stats: [
          { val: "1.850", unit: "m²" },
          { val: "12", unit: "habitatges" },
          { val: "A", unit: "certificació" },
        ],
        img: "https://images.unsplash.com/photo-1486325212027-8081e485255e?w=900&q=85&auto=format&fit=crop",
        featured: false,
      },
      {
        id: "aerotermia-terrassa",
        tag: "Instal·lació tèrmica",
        name: "Aerotèrmia + terra radiant a Terrassa",
        location: "Terrassa, Vallès Occidental",
        year: "2023",
        m2: "210 m²",
        services: ["Aerotèrmia", "Terra radiant", "ACS"],
        stats: [
          { val: "210", unit: "m²" },
          { val: "COP 4.3", unit: "rendiment" },
          { val: "65%", unit: "estalvi vs gas" },
        ],
        img: "assets/bomba.jpg",
        featured: false,
      },
      {
        id: "domotica-gava",
        tag: "Domòtica · KNX",
        name: "Casa intel·ligent KNX a Gavà",
        location: "Gavà, Baix Llobregat",
        year: "2023",
        m2: "280 m²",
        services: ["KNX", "Elèctrica", "Solar", "Seguretat"],
        stats: [
          { val: "280", unit: "m²" },
          { val: "KNX", unit: "protocol" },
          { val: "1 app", unit: "control total" },
        ],
        img: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=900&q=85&auto=format&fit=crop",
        featured: false,
      },
    ];

    const FILTERS_CA = ["Tots", "Obra nova", "Reforma", "Solar", "Aerotèrmia", "Domòtica"];
    const FILTERS_ES = ["Todos", "Obra nueva", "Reforma", "Solar", "Aerotermia", "Domótica"];
    const FILTERS_EN = ["All", "New build", "Renovation", "Solar", "Heat pump", "Smart home"];

    function ProjectCard({ project }) {
      const { open } = useModal();
      return (
        <div className={"project-card reveal" + (project.featured ? " project-card--featured" : "")}
          onClick={() => open("Parla amb nosaltres sobre aquest projecte")}>
          <img src={project.img} alt={project.name} className="project-card__img" loading="lazy" />
          <div className="project-card__info">
            <span className="project-card__tag">{project.tag}</span>
            <div className="project-card__name">{project.name}</div>
            <div className="project-card__meta">{project.location} · {project.year}</div>
          </div>
          <div className="project-card__overlay">
            <div className="project-card__stats">
              {project.stats.map((s, i) => (
                <div className="project-card__stat" key={i}>
                  <strong>{s.val}</strong>
                  <span>{s.unit}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function ProjectsPage() {
      const { open } = useModal();
      const { t, lang } = useLang();
      const [activeFilter, setActiveFilter] = React.useState(0);
      const filters = lang === "es" ? FILTERS_ES : lang === "en" ? FILTERS_EN : FILTERS_CA;

      const labels = {
        ca: {
          eyebrow: "Casos reals",
          title: "Projectes executats.",
          sub: "Cada obra és diferent. Aquí en trobaràs alguns — des de cases unifamiliars fins a edificis plurifamiliars, amb aerotèrmia, solar i domòtica integrats.",
          statProj: "Projectes", statYears: "Anys d'experiència", statSaving: "Estalvi mitjà", statZones: "Zones a Catalunya",
          ctaTitle: "El teu projecte, el següent.",
          ctaSub: "Comparteix-nos la idea i et tornem una proposta tècnica en menys d'una setmana.",
          ctaBtn: "Demana pressupost",
          backHome: "← Tornar a l'inici",
        },
        es: {
          eyebrow: "Casos reales",
          title: "Proyectos ejecutados.",
          sub: "Cada obra es diferente. Aquí encontrarás algunos — desde casas unifamiliares hasta edificios plurifamiliares, con aerotermia, solar y domótica integrados.",
          statProj: "Proyectos", statYears: "Años de experiencia", statSaving: "Ahorro medio", statZones: "Zonas en Cataluña",
          ctaTitle: "Tu proyecto, el siguiente.",
          ctaSub: "Compártenos la idea y te devolvemos una propuesta técnica en menos de una semana.",
          ctaBtn: "Pide presupuesto",
          backHome: "← Volver al inicio",
        },
        en: {
          eyebrow: "Real cases",
          title: "Completed projects.",
          sub: "Every build is different. Here are some of them — from single-family homes to multi-family buildings, with heat pumps, solar and smart home integrated.",
          statProj: "Projects", statYears: "Years of expertise", statSaving: "Average savings", statZones: "Areas in Catalonia",
          ctaTitle: "Your project, next.",
          ctaSub: "Share your idea and we'll send you a technical proposal in less than a week.",
          ctaBtn: "Get a quote",
          backHome: "← Back to home",
        },
      };
      const l = labels[lang] || labels.ca;

      return (
        <div>
          <Navbar />
          <div className="page-hero">
            <div className="container">
              <a href="index.html" className="page-hero__eyebrow" style={{ display: "inline-block", marginBottom: 24, color: "rgba(255,255,255,0.45)", fontSize: 13 }}>
                {l.backHome}
              </a>
              <Eyebrow light>{l.eyebrow}</Eyebrow>
              <h1 className="page-hero__title" style={{ marginTop: 16 }}>{l.title}</h1>
              <p className="page-hero__sub">{l.sub}</p>
            </div>
          </div>

          <div className="section section--paper" style={{ paddingTop: 0, paddingBottom: 0 }}>
            <div className="container">
              <div className="projects-filters">
                {filters.map((f, i) => (
                  <button key={i} className={"filter-btn" + (activeFilter === i ? " is-active" : "")}
                    onClick={() => setActiveFilter(i)}>{f}</button>
                ))}
              </div>
            </div>
          </div>

          <div className="section section--paper" style={{ paddingTop: 2 }}>
            <div className="projects-grid">
              {PROJECTS.map(p => <ProjectCard key={p.id} project={p} />)}
            </div>
          </div>

          <div className="section">
            <div className="container">
              <div className="stats-bar">
                <div className="stats-bar__item"><div className="stats-bar__num">180+</div><div className="stats-bar__label">{l.statProj}</div></div>
                <div className="stats-bar__item"><div className="stats-bar__num">+20</div><div className="stats-bar__label">{l.statYears}</div></div>
                <div className="stats-bar__item"><div className="stats-bar__num">42%</div><div className="stats-bar__label">{l.statSaving}</div></div>
                <div className="stats-bar__item"><div className="stats-bar__num">30+</div><div className="stats-bar__label">{l.statZones}</div></div>
              </div>
            </div>
          </div>

          <div className="cta-projects">
            <div className="container">
              <h2 className="cta-projects__title">{l.ctaTitle}</h2>
              <p className="cta-projects__sub">{l.ctaSub}</p>
              <Button variant="accent" size="xl" onClick={() => open(l.ctaBtn)}>{l.ctaBtn}</Button>
            </div>
          </div>

          <footer className="footer">
            <div className="container">
              <div className="footer__bottom" style={{ borderTop: "1px solid rgba(255,255,255,0.12)", paddingTop: 24 }}>
                <span>© {new Date().getFullYear()} De baix a dalt SLU.</span>
                <a href="index.html" style={{ color: "rgba(255,255,255,0.5)", fontSize: 13 }}>{l.backHome}</a>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <LangProvider>
        <ModalProvider>
          <ProjectsPage />
        </ModalProvider>
      </LangProvider>
    );
  </script>
</body>
</html>
