## El context energètic actual a Catalunya

El preu del gas natural a Catalunya ha augmentat un 34% en els darrers tres anys. Mentrestant, les bombes de calor aerotèrmiques han millorat el seu rendiment: els models actuals treballen amb COP superiors a 4, és a dir, per cada kWh elèctric consumit produeixen més de 4 kWh de calor.

## Costos d'instal·lació comparats

Per a un habitatge unifamiliar de 150 m² ben aïllat a Catalunya:

- **Caldera de gas de condensació**: 3.500–5.500 €
- **Aerotèrmia (unitat exterior + fan-coils o terra radiant)**: 8.000–14.000 €

## Què és exactament una casa passiva?

Una casa passiva (Passivhaus) és un estàndard de construcció que estableix uns requisits màxims de demanda energètica:

- **Calefacció**: ≤ 15 kWh/m²·any
- **Refrigeració**: ≤ 15 kWh/m²·any
- **Energia primària total**: ≤ 120 kWh/m²·any
- **Hermeticitat**: ≤ 0,6 renovacions d'aire per hora a 50 Pa

Per context, una casa convencional a Catalunya consumeix 80–140 kWh/m²·any per calefacció. Una casa passiva consumeix entre 5 i 15 vegades menys.

## Els cinc principis del disseny passiu

### 1. Aïllament continu sense ponts tèrmics
L'envolupant de l'edifici (murs, sostre, solera) ha d'estar completament aïllada sense interrupcions. Un pont tèrmic pot representar el 30% de les pèrdues totals de calor.

### 2. Finestres de triple vidre orientades al sud
A Catalunya, una casa ben orientada pot obtenir fins al 50% de la seva energia de calefacció de manera passiva a través de les finestres del sud.

### 3. Hermeticitat a l'aire
Una construcció convencional perd fins al 40% de la calor per infiltracions d'aire. La membrana d'estanquitat i els detalls de juntes dels marcs eliminen pràcticament aquesta pèrdua.

### 4. Ventilació mecànica amb recuperació de calor (VMC)
En comptes d'obrir finestres i perdre calor, un sistema VMC renova l'aire interior recuperant entre el 75 i el 92% de l'energia tèrmica.

### 5. Absència de ponts tèrmics estructurals
Cada element que travessa l'envolupant (cargols, ancoratges, lloses de balcó) és un pont tèrmic potencial. El disseny passiu els elimina o minimitza a la fase de projecte.

## Quant costa construir una casa passiva a Catalunya?

El sobrecost respecte a una construcció convencional de qualitat és de **8–15%**, no del 30–50% que molts propietaris creuen.

Per a una casa unifamiliar de 200 m²:

| Estàndard | Cost aproximat | Factura energètica anual |
|---|---|---|
| Construcció convencional | 280.000–340.000 € | 2.200–3.400 € |
| Construcció eficient (CTE+) | 300.000–370.000 € | 800–1.400 € |
| Casa passiva (Passivhaus) | 320.000–400.000 € | 150–400 € |

<div class="highlight">
"El sobrecost d'una casa passiva respecte a una construcció convencional es recupera en 12–18 anys gràcies a l'estalvi en factures. A partir d'aquí, la casa genera retorn net durant la resta de la seva vida útil de 80–100 anys."
</div>

## Per a quin tipus de propietari té sentit?

- Qui construeix per a habitatge habitual (no per vendre en 5 anys)
- Qui valora el confort tèrmic i l'absència de corrents i humitats
- Qui vol independència energètica a llarg termini
- Qui combinat amb solar i aerotèrmia vol arribar a energia zero o positiva

2. **Disseny de l'envolupant** amb verificació PHPP

4. **Execució amb control d'estanquitat** (blower door test intermedi)
5. **Certificació final** i lliurament amb formació a l'usuari

Si estàs valorant construir a Catalunya el 2025, el primer pas és una visita tècnica sense compromís per avaluar el solar i les possibilitats.

          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <LangProvider>
        <ModalProvider>
          <BlogPage />
        </ModalProvider>
      </LangProvider>
    );
  </script>
</body>
